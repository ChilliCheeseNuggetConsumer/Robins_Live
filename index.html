<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lebenslauf</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* WICHTIG: sorgt dafür, dass 100% Höhe funktioniert */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
    }

    /* Hauptcontainer */
    .container {
      display: flex;
      width: 100%;
      height: 100vh; /* volle Bildschirmhöhe */
    }

    /* Sidebar links */
    .sidebar {
      width: 30%;
      background: #2c2c2c;
      color: white;
      padding: 40px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar img {
      width: 140px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .sidebar h1 {
      margin: 10px 0;
    }

    /* Content rechts */
    .content {
      width: 70%;
      padding: 50px;
      background: white;
      box-sizing: border-box;
      overflow-y: auto; /* Scroll wenn Inhalt länger */
    }

    h2 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    .section {
      margin-bottom: 30px;
    }

    /* ✅ Mobile Optimierung */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar, .content {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <img src="https://via.placeholder.com/150" alt="Profilbild">

    <h1>Max Mustermann</h1>
    <p>Webentwickler</p>

    <h3>Kontakt</h3>
    <p>max@email.de</p>
    <p>+49 123 456789</p>

    <h3>Skills</h3>
    <p>HTML / CSS / JS</p>
    <p>React / Node</p>
  </div>

  <div class="content">

    <div class="section">
      <h2>Profil</h2>
      <p>Motivierter Entwickler mit Erfahrung in modernen Webtechnologien.</p>
    </div>

    <div class="section">
      <h2>Berufserfahrung</h2>

      <p><strong>Frontend Entwickler</strong><br>
      <small>2022 – heute</small></p>

      <p><strong>Praktikum IT</strong><br>
      <small>2021 – 2022</small></p>

    </div>

    <div class="section">
      <h2>Ausbildung</h2>
      <p>Studium Informatik</p>
    </div>

  </div>

</div>

</body>
</html>
